<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Absensi - Cita Rasa Nusantara</title>
    <style>
        :root {
            --primary-gold: #d4af37;
            --dark-bg: #1a1a1a;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1555244162-803834f70033?q=80&w=2070'); /* Background Mewah Kuliner */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        .container {
            background: rgba(26, 26, 26, 0.85);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: 0.5s;
        }

        h2 {
            color: var(--primary-gold);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 30px;
            font-size: 1.4rem;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: var(--glass);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary-gold);
            background: rgba(255,255,255,0.15);
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #d4af37, #f2d06b);
            color: #1a1a1a;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.4s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }

        .hidden { display: none; }

        /* Dashboard Styles */
        .status-card {
            background: var(--glass);
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            border-left: 4px solid var(--primary-gold);
        }

        .profile-img {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid var(--primary-gold);
            margin-bottom: 15px;
        }

        .clock {
            font-size: 2rem;
            font-weight: bold;
            margin: 15px 0;
            color: var(--primary-gold);
        }
    </style>
</head>
<body>

<div id="loginSection" class="container">
    <div style="font-size: 3rem; margin-bottom: 10px;">🍽️</div>
    <h2>Absensi Karyawan<br><span style="font-size: 0.9rem; color: #fff;">Cita Rasa Nusantara</span></h2>
    
    <div class="input-group">
        <input type="text" id="username" placeholder="ID Karyawan">
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="Passcode (6 Digit)">
    </div>
    <button onclick="handleLogin()">Masuk Dashboard</button>
</div>

<div id="dashboardSection" class="container hidden">
    <img src="https://www.w3schools.com/howto/img_avatar.png" class="profile-img" alt="Foto">
    <h3>Selamat Bekerja,</h3>
    <h2 id="displayName" style="margin-top: 0;">Nama Karyawan</h2>
    
    <div class="clock" id="realtimeClock">00:00:00</div>
    
    <div class="status-card">
        <p id="attendanceStatus">Status: <b>Belum Absen</b></p>
        <button onclick="doAbsen()" id="btnAbsen">Klik Untuk Absen Masuk</button>
    </div>

    <button onclick="location.reload()" style="background: none; color: #666; font-size: 0.8rem; margin-top: 20px; border: 1px solid #333;">Logout</button>
</div>

<script>
    // Fungsi Jam Realtime
    function updateClock() {
        const now = new Date();
        const timeStr = now.toLocaleTimeString('id-ID');
        if(document.getElementById('realtimeClock')) {
            document.getElementById('realtimeClock').innerText = timeStr;
        }
    }
    setInterval(updateClock, 1000);

    function handleLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        // Validasi: ID harus diakhiri '213' dan Password harus 6 angka
        if (user.endsWith('213') && pass.length === 6 && !isNaN(pass)) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('displayName').innerText = user.replace('213', '').toUpperCase();
        } else {
            alert("Akses Ditolak! Periksa kembali ID dan Passcode Anda.");
        }
    }

    function doAbsen() {
        const btn = document.getElementById('btnAbsen');
        const status = document.getElementById('attendanceStatus');
        
        btn.style.display = 'none';
        status.innerHTML = "Status: <b style='color: #2ecc71;'>Berhasil Absen Masuk</b>";
        alert("Terima kasih! Absensi Anda telah tercatat di sistem Cita Rasa Nusantara.");
    }
</script>

</body>
</html>￼Enter
